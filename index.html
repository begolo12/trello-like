<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<title>Kanban</title>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--surface:#131a2b;--surface2:#1a2338;--border:#2a3450;--border2:#3a456a;--text:#e8edf5;--text2:#8896b5;--text3:#5a6a8a;--accent:#4f7dff;--accent2:#6b96ff;--accent-bg:rgba(79,125,255,.12);--red:#f0414a;--orange:#f5a623;--green:#34d399;--radius:10px;--radius2:14px}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
input,textarea,button{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* HEADER */
header{flex-shrink:0;background:rgba(10,15,30,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 12px;position:sticky;top:0;z-index:100}
.head-inner{display:flex;align-items:center;gap:8px;height:50px}
.logo{font-weight:700;font-size:16px;white-space:nowrap;flex-shrink:0;background:linear-gradient(135deg,#4f7dff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-box{flex:1;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:0 12px;min-width:0}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:13px;padding:7px 4px;min-width:0}
.search-box input::placeholder{color:var(--text3)}

/* MAIN CONTENT - scrollable between header and bottom bar */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.tab-page{display:none;padding:12px;min-height:100%}
.tab-page.active{display:block}

/* BOTTOM NAV */
nav{flex-shrink:0;background:rgba(10,15,30,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;padding:2px 0 env(safe-area-inset-bottom,4px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 0 2px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;transition:.1s;border-top:2px solid transparent}
.nav-item .nav-icon{font-size:20px;line-height:1}
.nav-item.active{color:var(--accent2);border-top-color:var(--accent)}
.nav-item:active{opacity:.6}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .stat-num{font-size:28px;font-weight:700;margin-bottom:2px}
.stat-card .stat-label{font-size:12px;color:var(--text2)}
.stat-card.overdue .stat-num{color:var(--red)}
.stat-card.soon .stat-num{color:var(--orange)}
.stat-card.ok .stat-num{color:var(--green)}
.section-title{font-size:14px;font-weight:600;margin:14px 0 8px;color:var(--text2)}
.list-item{display:flex;justify-content:space-between;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:13px}
.list-item .badge{background:var(--surface2);padding:2px 10px;border-radius:20px;font-size:12px;color:var(--text2)}

/* KANBAN */
.board-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;-webkit-overflow-scrolling:touch}
.board-tabs::-webkit-scrollbar{height:0}
.board-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;position:relative}
.board-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.board-tab .close-tab{display:none;position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;line-height:16px;text-align:center;border:2px solid var(--bg)}
.board-tab:hover .close-tab,.board-tab.active .close-tab{display:block}
.board-wrap{display:flex;gap:12px;overflow-x:auto;padding:0 0 12px;align-items:flex-start;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.col{width:280px;min-width:260px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);display:flex;flex-direction:column;max-height:calc(100dvh - 180px)}
.col-head{display:flex;align-items:center;gap:6px;padding:10px 10px 6px;border-bottom:1px solid var(--border)}
.col-head h3{margin:0;font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:2px 4px;border-radius:4px}
.col-head h3:focus{background:rgba(0,0,0,.2);outline:1px solid var(--accent);white-space:normal;word-break:break-word;cursor:text}
.col-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:10px;flex-shrink:0}
.col-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px}
.col-del:hover{color:var(--red);background:rgba(240,65,74,.1)}
.col-cards{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;min-height:40px}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:grab;transition:border-color .15s;position:relative}
.card:hover{border-color:var(--border2);background:#1e2840}
.card.dragging{opacity:.3;transform:scale(.95)}
.card.drag-over{border-color:var(--accent)!important;box-shadow:0 0 0 2px var(--accent-bg)!important}
.card-title{font-size:13px;font-weight:500;margin-bottom:4px;word-break:break-word}
.card-desc{font-size:11px;color:var(--text2);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:10px;color:var(--text3)}
.card-meta .due{color:var(--orange)}
.card-meta .overdue{color:var(--red);font-weight:600}
.label-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;color:#fff;margin-right:3px}
.assignee-pill{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;line-height:20px;text-align:center;font-weight:600;margin-right:2px}
.card-actions{display:none;position:absolute;top:6px;right:6px;gap:3px}
.card:hover .card-actions{display:flex}
@media(max-width:640px){.card-actions{display:flex;position:static;margin-top:4px}}
.card-actions button{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;padding:2px 7px;font-size:10px;transition:.15s}
.card-actions button:hover{opacity:.8}
.col-add-btn{margin:6px;padding:6px;border-radius:var(--radius);border:1px dashed var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;text-align:center}
.col-add-btn:hover{background:var(--surface2);color:var(--text2)}
.new-card-form{padding:6px;display:none;flex-direction:column;gap:4px}
.new-card-form.open{display:flex}
.new-card-form input,.new-card-form textarea{padding:7px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px}
.new-card-form textarea{resize:vertical;min-height:40px}
.new-card-form .form-actions{display:flex;gap:4px}
.new-card-form button{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:none}
.new-card-form .save{background:var(--accent);color:#fff}
.new-card-form .cancel{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* GANTT */
.gantt-section{margin-bottom:16px}
.gantt-col-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;padding:6px 0;border-bottom:1px solid var(--border)}
.gantt-bar-wrap{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}
.gantt-bar-wrap .gantt-label{width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.gantt-bar{flex:1;height:24px;border-radius:6px;position:relative;min-width:4px;transition:width .3s}
.gantt-bar .gantt-date{position:absolute;right:-80px;top:3px;font-size:10px;color:var(--text3);white-space:nowrap}
.gantt-empty{text-align:center;padding:30px;color:var(--text3);font-size:13px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center}}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2) var(--radius2) 0 0;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:var(--radius2)}}
.modal h2{margin:0 0 14px;font-size:15px;font-weight:600}
.modal label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 11px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;margin-bottom:10px}
.modal textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:none}
.modal-actions .prim{background:var(--accent);color:#fff}
.modal-actions .sec{background:transparent;color:var(--text2);border:1px solid var(--border)}
.modal-actions .danger{background:var(--red);color:#fff}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 18px;font-size:12px;color:var(--text2);z-index:300;display:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;animation:toastIn .2s}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading::after{content:'...';animation:dots 1.2s steps(4) infinite}
@keyframes dots{0%{content:'.'}25%{content:'..'}50%{content:'...'}75%{content:''}}

/* Empty */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state p{font-size:13px;margin:0 0 12px}
.empty-state button{padding:8px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer}

/* Desktop <768px: bottom nav stays bottom. Desktop >768px: sidebar */
@media(min-width:768px){
  body{flex-direction:row-reverse}
  nav{flex-direction:column;width:80px;border-top:none;border-left:1px solid var(--border)}
  .nav-item{padding:16px 0}
  header .head-inner{padding:0 8px}
}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <span class="logo">Kanban</span>
    <div class="search-box"><input id="searchInput" placeholder="Search..." oninput="onSearch(this.value)"/></div>
    <button class="head-btn" onclick="reloadAll()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:6px">↻</button>
  </div>
</header>

<main id="mainContent">
  <div class="tab-page active" id="pageDashboard"><div id="dashContent" class="loading">Loading</div></div>
  <div class="tab-page" id="pageKanban"><div id="kanbanContent"></div></div>
  <div class="tab-page" id="pageGantt"><div id="ganttContent" class="loading">Loading</div></div>
</main>

<nav id="bottomNav">
  <button class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-item" data-tab="kanban" onclick="switchTab('kanban')"><span class="nav-icon">📋</span>Kanban</button>
  <button class="nav-item" data-tab="gantt" onclick="switchTab('gantt')"><span class="nav-icon">📈</span>Gantt</button>
</nav>

<div class="modal-overlay" id="modalOverlay" onclick="modalClose(event)"><div class="modal" id="modalBody" onclick="event.stopPropagation()"></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══ HELPERS ═══
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))
const toast=m=>{const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2500)}
const today=()=>new Date().toISOString().slice(0,10)
async function api(url,o={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...o});if(!r.ok){try{const e=await r.json();throw new Error(e.detail||r.statusText)}catch(e){throw e}}return r.status===204?null:r.json()}

// ═══ TAB SWITCH ═══
let currentTab='dashboard'
function switchTab(tab){
  currentTab=tab
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.toggle('active',p.id==='page'+tab.charAt(0).toUpperCase()+tab.slice(1)))
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab))
  if(tab==='dashboard') renderDashboard()
  if(tab==='kanban') renderKanban()
  if(tab==='gantt') renderGantt()
}

// ═══ DASHBOARD ═══
let dashData=null
async function renderDashboard(){
  $('dashContent').innerHTML='<div class="loading">Loading</div>'
  try{
    dashData=await api('/api/dashboard')
    let h=`<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${dashData.total_cards}</div><div class="stat-label">Total Cards</div></div>
      <div class="stat-card overdue"><div class="stat-num">${dashData.overdue}</div><div class="stat-label">Overdue</div></div>
      <div class="stat-card soon"><div class="stat-num">${dashData.due_today}</div><div class="stat-label">Due Today</div></div>
      <div class="stat-card ok"><div class="stat-num">${dashData.due_soon}</div><div class="stat-label">Due This Week</div></div>
    </div>`
    h+=`<div class="section-title">📋 Boards (${dashData.board_count})</div>`
    h+=dashData.boards.map(b=>`<div class="list-item"><span>${esc(b.title)}</span><span class="badge">${b.card_count}</span></div>`).join('')
    h+=`<div class="section-title">📦 Columns (${dashData.column_count})</div>`
    h+=dashData.columns.map(c=>`<div class="list-item"><span>${esc(c.title)}</span><span class="badge">${c.card_count}</span></div>`).join('')
    $('dashContent').innerHTML=h
  }catch(e){$('dashContent').innerHTML=`<div class="empty-state"><p>⚠ ${esc(e.message)}</p><button onclick="renderDashboard()">Retry</button></div>`}
}

// ═══ KANBAN ═══
let boards=[], activeBoardId=null, allColumns=[], dragData=null
async function loadBoards(){boards=await api('/api/boards');if(!activeBoardId&&boards.length)activeBoardId=boards[0].id}
async function loadBoard(id){allColumns=await api(`/api/boards/${id}/columns`);return allColumns}

async function renderKanban(){
  try{
    await loadBoards()
    if(!boards.length){$('kanbanContent').innerHTML=`<div class="empty-state"><p>No boards yet</p><button onclick="showModal('newBoard')">Create Board</button></div>`;return}
    let h=`<div class="board-tabs">${boards.map(b=>`<div class="board-tab${b.id===activeBoardId?' active':''}" onclick="switchBoard(${b.id})">${esc(b.title)}<span class="close-tab" onclick="event.stopPropagation();delBoard(${b.id})">×</span></div>`).join('')}
      <button class="board-tab" onclick="showModal('newBoard')" style="border-style:dashed;opacity:.7">+</button></div>`
    await loadBoard(activeBoardId)
    h+=`<div class="board-wrap">${allColumns.map(col=>{
      let cards=(col.cards||[]).filter(c=>!c.archived).map(c=>renderCard(c)).join('')
      return `<div class="col" data-col="${col.id}" ondragover="e=>e.preventDefault();e.target.closest('.card')?.classList.add('drag-over')" ondrop="dropCard(event,${col.id})"><div class="col-head"><h3 contenteditable="false" onfocus="e=>{e.target.contentEditable=true}" onblur="renameCol(${col.id},this)">${esc(col.title)}</h3><span class="col-count">${(col.cards||[]).filter(c=>!c.archived).length}</span><button class="col-del" onclick="delCol(${col.id})">×</button></div><div class="col-cards" id="cards-${col.id}">${cards}</div>
      <div class="new-card-form" id="cardForm-${col.id}"><input id="cardInput-${col.id}" placeholder="Card title" maxlength="200"/><textarea id="cardDesc-${col.id}" placeholder="Description" rows="2"></textarea><div class="form-actions"><button class="save" onclick="addCard(${col.id})">Add</button><button class="cancel" onclick="toggleForm(${col.id})">Cancel</button></div></div>
      <button class="col-add-btn" id="addBtn-${col.id}" onclick="toggleForm(${col.id})">+ Add card</button></div>`
    }).join('')}
    <button style="min-width:60px;flex-shrink:0;border:1px dashed var(--border);border-radius:var(--radius2);background:transparent;color:var(--text3);font-size:28px;cursor:pointer;height:80px;align-self:flex-start;margin-top:0" onclick="showModal('addCol')">+</button></div>`
    $('kanbanContent').innerHTML=h
    // Attach drag events
    document.querySelectorAll('.card').forEach(el=>{
      el.draggable=true
      el.ondragstart=e=>{dragData={id:+el.dataset.id,fromCol:+el.dataset.col};el.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
      el.ondragend=e=>{el.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));dragData=null}
      el.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move'}
    })
    // Column drop zone
    document.querySelectorAll('.col').forEach(col=>{
      col.ondragover=e=>{e.preventDefault()}
      col.ondrop=e=>dropCard(e,+col.dataset.col)
    })
  }catch(e){$('kanbanContent').innerHTML=`<div class="empty-state"><p>⚠ ${esc(e.message)}</p><button onclick="renderKanban()">Retry</button></div>`}
}

function renderCard(c){
  const od=c.due_date&&c.due_date.slice(0,10)<today()
  return `<div class="card" data-id="${c.id}" data-col="${c.column_id}" data-pos="${c.position}">
    <div class="card-title">${esc(c.title)}</div>
    ${c.description?`<div class="card-desc">${esc(c.description)}</div>`:''}
    <div class="card-meta">
      ${(c.labels||[]).map(l=>`<span class="label-pill" style="background:${l.color}">${esc(l.name)}</span>`).join('')}
      ${(c.assignees||[]).map(a=>`<span class="assignee-pill" title="${esc(a.assignee)}">${a.assignee.charAt(0).toUpperCase()}</span>`).join('')}
      ${c.due_date?`<span class="${od?'overdue':'due'}">● ${c.due_date.slice(0,10)}</span>`:''}
    </div>
    <div class="card-actions">
      <button onclick="event.stopPropagation();showModal('editCard',{id:${c.id},colId:${c.column_id}})">✎</button>
      <button onclick="event.stopPropagation();showModal('archiveCard',{id:${c.id}})">📦</button>
      <button onclick="event.stopPropagation();delCard(${c.id})">✕</button>
    </div>
  </div>`
}

function switchBoard(id){activeBoardId=id;renderKanban()}
function toggleForm(colId){const f=$('cardForm-'+colId),b=$('addBtn-'+colId);f.classList.toggle('open');b.style.display=f.classList.contains('open')?'none':''}
async function addCard(cid){const t=$('cardInput-'+cid).value.trim();if(!t)return;await api('/api/cards',{method:'POST',body:JSON.stringify({column_id:cid,title:t,description:$('cardDesc-'+cid).value.trim()})});$('cardInput-'+cid).value='';$('cardDesc-'+cid).value='';toggleForm(cid);renderKanban();toast('Card added')}
async function delCard(id){if(!await confirmDlg('Delete this card?'))return;await api(`/api/cards/${id}`,{method:'DELETE'});renderKanban();toast('Card deleted')}
async function delCol(id){if(!await confirmDlg('Delete this column and all cards?'))return;await api(`/api/columns/${id}`,{method:'DELETE'});renderKanban();toast('Column deleted')}
async function delBoard(id){if(!await confirmDlg('Delete this board and all its cards?'))return;await api(`/api/boards/${id}`,{method:'DELETE'});boards=boards.filter(b=>b.id!==id);if(activeBoardId===id)activeBoardId=boards.length?boards[0].id:null;renderKanban()}
async function renameCol(id,el){el.contentEditable=false;const t=el.textContent.trim();if(t)await api(`/api/columns/${id}`,{method:'PUT',body:JSON.stringify({title:t})})}
async function dropCard(e,targetCol){e.preventDefault();document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));if(!dragData)return;const {id,fromCol}=dragData;const cardsEl=$('cards-'+targetCol);if(!cardsEl)return;const cards=cardsEl.querySelectorAll('.card');let pos=1;const dt=e.target.closest('.card');if(dt){const idx=Array.from(cards).indexOf(dt);pos=idx>=0?idx+1:cards.length+1}else pos=cards.length+1;try{if(fromCol===targetCol){await api(`/api/cards/${id}/reorder`,{method:'PUT',body:JSON.stringify({position:pos})})}else{await api(`/api/cards/${id}/move`,{method:'PUT',body:JSON.stringify({column_id:targetCol,position:pos})})}renderKanban()}catch(e){toast('Move failed')}dragData=null}

// ═══ GANTT ═══
async function renderGantt(){
  $('ganttContent').innerHTML='<div class="loading">Loading</div>'
  try{
    const data=await api('/api/gantt')
    if(!data.length){$('ganttContent').innerHTML='<div class="gantt-empty">No cards with due dates. Add due dates to cards to see them here.</div>';return}
    const colGroups={};data.forEach(c=>{if(!colGroups[c.column_name])colGroups[c.column_name]=[];colGroups[c.column_name].push(c)})
    let h=''
    Object.entries(colGroups).forEach(([name,cards])=>{
      h+=`<div class="gantt-section"><div class="gantt-col-title">${esc(name)} (${cards.length})</div>`
      cards.forEach(c=>{
        if(!c.due_date){h+=`<div class="gantt-bar-wrap"><span class="gantt-label">${esc(c.title)} <span style="color:var(--text3)">(no date)</span></span></div>`;return}
        const dd=c.due_date.split('T')[0]
        const daysLeft=Math.max(0,Math.round((new Date(dd)-new Date(today()))/86400000))
        const barColor=daysLeft<=0?'var(--red)':daysLeft<=3?'var(--orange)':'var(--accent)'
        const pct=Math.min(100,daysLeft*5+10)+'%'
        h+=`<div class="gantt-bar-wrap"><span class="gantt-label">${esc(c.title)}</span><div class="gantt-bar" style="width:${pct};background:${barColor};min-width:${daysLeft<=0?'80px':'40px'}"><span class="gantt-date">${dd}</span></div></div>`
      })
      h+='</div>'
    })
    $('ganttContent').innerHTML=h
  }catch(e){$('ganttContent').innerHTML=`<div class="gantt-empty">⚠ ${esc(e.message)}</div>`}
}

// ═══ SEARCH ═══
let searchTimer
async function onSearch(q){
  clearTimeout(searchTimer)
  if(!q.trim()){document.querySelectorAll('.card').forEach(c=>c.style.display='');return}
  searchTimer=setTimeout(async()=>{
    try{
      const res=await api(`/api/search?q=${encodeURIComponent(q)}`)
      if(currentTab!=='kanban'){switchTab('kanban')}
      // highlight matching cards
      document.querySelectorAll('.card').forEach(c=>{const id=+c.dataset.id;c.style.display=res.some(r=>r.id===id)?'':'none'})
      toast(`Found ${res.length} cards`)
    }catch(e){}
  },300)
}

// ═══ MODAL ═══
function showModal(type,data){
  $('modalOverlay').classList.add('open')
  const body=$('modalBody')
  if(type==='newBoard'){
    body.innerHTML=`<h2>New Board</h2><input id="modalInput" placeholder="Board name" maxlength="100" autofocus/><div class="modal-actions"><button class="sec" onclick="modalClose()">Cancel</button><button class="prim" onclick="createBoard()">Create</button></div>`
    setTimeout(()=>{$('modalInput').focus()},100)
  }else if(type==='addCol'){
    body.innerHTML=`<h2>New Column</h2><input id="modalInput" placeholder="Column name" maxlength="100" autofocus/><div class="modal-actions"><button class="sec" onclick="modalClose()">Cancel</button><button class="prim" onclick="addColumn()">Add</button></div>`
    setTimeout(()=>{$('modalInput').focus()},100)
  }else if(type==='editCard'){
    const col=allColumns.find(c=>c.id===data.colId),card=col?.cards?.find(c=>c.id===data.id)
    if(!card)return
    body.innerHTML=`<h2>Edit Card</h2><label>Title</label><input id="modalInput" value="${esc(card.title)}" maxlength="200"/><label>Description</label><textarea id="modalDesc" rows="3">${esc(card.description||'')}</textarea><label>Due date</label><input id="modalDue" type="date" value="${card.due_date?card.due_date.slice(0,10):''}"/>
    ${(card.labels||[]).map(l=>`<span class="label-pill" style="background:${l.color};cursor:pointer;margin:2px;display:inline-block" onclick="removeLabel(${card.id},${l.id})">${esc(l.name)} ✕</span>`).join('')}
    <div style="display:flex;gap:4px;margin:6px 0"><input id="labelInput" placeholder="Add label" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px"/><button onclick="addLabel(${card.id})" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px">+</button></div>
    <div class="modal-actions"><button class="danger" onclick="delCard(${data.id});modalClose()">Delete</button><button class="sec" onclick="modalClose()">Cancel</button><button class="prim" onclick="saveCard(${card.id})">Save</button></div>`
    setTimeout(()=>{$('modalInput').focus()},100)
  }else if(type==='archiveCard'){
    body.innerHTML=`<h2>Archive Card?</h2><p style="font-size:13px;color:var(--text2)">Move to archived?</p><div class="modal-actions"><button class="sec" onclick="modalClose()">Cancel</button><button class="prim" onclick="archiveCard(${data.id})">Archive</button></div>`
  }
}

async function createBoard(){const v=$('modalInput').value.trim();if(!v)return;modalClose();await api('/api/boards',{method:'POST',body:JSON.stringify({title:v})});renderKanban();toast('Board created')}
async function addColumn(){const v=$('modalInput').value.trim();if(!v)return;modalClose();const cols=await loadBoard(activeBoardId);await api('/api/columns',{method:'POST',body:JSON.stringify({board_id:activeBoardId,title:v,position:(cols.length||0)+1})});renderKanban();toast('Column added')}
async function saveCard(id){const t=$('modalInput').value.trim();if(!t)return;const b={title:t};const d=$('modalDesc').value.trim();if(d)b.description=d;const u=$('modalDue').value;if(u)b.due_date=u;modalClose();await api(`/api/cards/${id}`,{method:'PUT',body:JSON.stringify(b)});renderKanban();toast('Card saved')}
async function archiveCard(id){modalClose();await api(`/api/cards/${id}/archive`,{method:'PUT',body:JSON.stringify({archived:true})});renderKanban();toast('Card archived')}
async function addLabel(cardId){const v=$('labelInput').value.trim();if(!v)return;$('labelInput').value='';await api(`/api/cards/${cardId}/labels`,{method:'POST',body:JSON.stringify({name:v,color:'#3b82f6'})});toast('Label added');showModal('editCard',{id:cardId,colId:allColumns.find(c=>c.cards?.some(cc=>cc.id===cardId))?.id})}
async function removeLabel(cardId,lid){await api(`/api/cards/${cardId}/labels/${lid}`,{method:'DELETE'});toast('Label removed');showModal('editCard',{id:cardId,colId:allColumns.find(c=>c.cards?.some(cc=>cc.id===cardId))?.id})}

function modalClose(e){if(e&&e.target!==$('modalOverlay'))return;$('modalOverlay').classList.remove('open')}

// ═══ CONFIRM ═══
function confirmDlg(msg){
  return new Promise(res=>{
    $('modalOverlay').classList.add('open')
    $('modalBody').innerHTML=`<h2>Confirm</h2><p style="font-size:13px;color:var(--text2)">${esc(msg)}</p><div class="modal-actions"><button class="sec" onclick="res(false);modalClose()">Cancel</button><button class="danger" onclick="res(true);modalClose()">Yes</button></div>`
  })
}

// ═══ INIT ═══
async function reloadAll(){renderDashboard();if(currentTab==='kanban')renderKanban()}
// Register SW
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{})
// Start
renderDashboard()
</script>
